<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modular Euro-Synth & Step Sequencer (Custom Scale Update)</title>
  <!-- Load Tone.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <style>
    /* Eurorack Industrial Aesthetic */
    :root {
      --bg-color: #1a1a1a;
      --panel-color: #2e2e2e;
      --panel-border: #444444;
      --panel-screws: #888888;
      --text-color: #e0e0e0;
      --accent-cyan: #00ffff;
      --accent-magenta: #ff00ff;
      --accent-yellow: #ffff00;
      --accent-green: #00ff00;
      --knob-bg: #444444;
      --knob-pointer: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Courier New', Courier, monospace;
      user-select: none;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      margin-bottom: 20px;
      text-align: center;
    }

    header h1 {
      font-size: 24px;
      letter-spacing: 2px;
      color: var(--accent-cyan);
      text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
    }

    /* Master Controls & Power Bar */
    .power-bar {
      background: var(--panel-color);
      border: 2px solid var(--panel-border);
      padding: 10px 20px;
      margin-bottom: 20px;
      display: flex;
      gap: 20px;
      align-items: center;
      border-radius: 4px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }

    button {
      background: #444;
      color: white;
      border: 1px solid #666;
      padding: 8px 16px;
      cursor: pointer;
      font-weight: bold;
      text-transform: uppercase;
      border-radius: 3px;
    }

    button:active {
      background: #222;
    }

    button.active {
      background: var(--accent-green);
      color: black;
      border-color: #00cc00;
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-group label {
      font-size: 11px;
      text-transform: uppercase;
      color: #aaa;
    }

    .control-group input[type="range"] {
      appearance: none;
      background: #111;
      height: 6px;
      border-radius: 3px;
      outline: none;
    }

    .control-group input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent-cyan);
      cursor: pointer;
    }

    /* Eurorack Case Setup */
    .eurorack-case {
      background: #111;
      border: 8px solid #333;
      padding: 10px 4px;
      display: flex;
      gap: 10px;
      max-width: 1000px;
      width: 100%;
      overflow-x: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
      margin-bottom: 20px;
    }

    /* Modular Panels */
    .module {
      background: var(--panel-color);
      border: 2px solid var(--panel-border);
      position: relative;
      padding: 15px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 320px;
    }

    /* Pseudo Eurorack Screws */
    .module::before, .module::after {
      content: "⊕";
      position: absolute;
      color: var(--panel-screws);
      font-size: 10px;
    }
    .module::before { top: 2px; left: 5px; }
    .module::after { bottom: 2px; right: 5px; }

    .module-title {
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
      border-bottom: 1px dashed #555;
      width: 100%;
      text-align: center;
      padding-bottom: 4px;
    }

    /* Module Specific Styles */
    .mod-vco { border-top: 4px solid var(--accent-cyan); width: 180px; }
    .mod-vca { border-top: 4px solid var(--accent-magenta); width: 180px; }
    .mod-lfo { border-top: 4px solid var(--accent-yellow); width: 180px; }
    .mod-scale { border-top: 4px solid #ffffff; width: 200px; }
    .mod-drums { border-top: 4px solid var(--accent-green); width: 200px; }

    /* Eurorack Styled Knobs */
    .knob-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 15px;
      width: 100%;
    }

    .knob-container label {
      font-size: 10px;
      margin-bottom: 5px;
      color: #bbb;
      text-transform: uppercase;
    }

    .value-display {
      font-size: 10px;
      color: #888;
      margin-top: 2px;
    }

    select, input[type="text"] {
      background: #111;
      color: #fff;
      border: 1px solid #555;
      padding: 6px;
      font-size: 11px;
      outline: none;
      width: 90%;
      margin-bottom: 12px;
      font-family: inherit;
    }

    input[type="text"] {
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Sequencer Grid Module Layout */
    .sequencer-panel {
      background: var(--panel-color);
      border: 2px solid var(--panel-border);
      border-top: 4px solid #fff;
      width: 100%;
      max-width: 1000px;
      padding: 15px;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    }

    .sequencer-row {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      width: 100%;
    }

    .row-label {
      width: 90px;
      font-size: 11px;
      text-transform: uppercase;
      font-weight: bold;
      color: #aaa;
    }

    .grid-container {
      display: flex;
      gap: 4px;
      flex-grow: 1;
    }

    .step-btn {
      flex: 1;
      height: 30px;
      background: #333;
      border: 1px solid #444;
      border-radius: 2px;
      cursor: pointer;
      position: relative;
      padding: 0;
    }

    .grid-container .step-btn:nth-child(n+5):nth-child(-n+8),
    .grid-container .step-btn:nth-child(n+13):nth-child(-n+16) {
      background: #282828;
    }

    .step-btn.active {
      background: #555;
      border-color: #777;
    }

    /* LED Indicators inside steps */
    .step-btn::after {
      content: "";
      position: absolute;
      bottom: 3px;
      left: calc(50% - 3px);
      width: 6px;
      height: 6px;
      background: #222;
      border-radius: 50%;
    }

    .step-btn.active::after {
      background: var(--accent-magenta);
      box-shadow: 0 0 6px var(--accent-magenta);
    }

    /* Playhead tracking class */
    .step-btn.playing::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border: 2px solid var(--accent-cyan);
      z-index: 2;
      pointer-events: none;
    }

    /* Shift Register Logic Banner */
    .turing-status {
      font-size: 11px;
      margin-top: 10px;
      padding: 6px;
      background: #111;
      border-left: 3px solid var(--accent-yellow);
      width: 100%;
      text-align: left;
      overflow-x: auto;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <header>
    <h1>Δ-MODULAR-16 // HYBRID STEP-SEQUENCER</h1>
  </header>

  <!-- Master Power & Global Configurations -->
  <div class="power-bar">
    <button id="power-btn">Power On</button>
    <div class="control-group">
      <label for="bpm-slider">BPM</label>
      <input type="range" id="bpm-slider" min="60" max="200" value="120">
      <span id="bpm-val" class="value-display">120</span>
    </div>
    <div class="control-group">
      <label for="master-volume">Gain</label>
      <input type="range" id="master-volume" min="-30" max="0" value="-6" step="1">
      <span id="vol-val" class="value-display">-6dB</span>
    </div>
  </div>

  <!-- Eurorack Synthesis Architecture Row -->
  <div class="eurorack-case">

    <!-- VCO MODULE -->
    <div class="module mod-vco">
      <div class="module-title">VCO-1 (Synth)</div>
      <label style="font-size:10px; color:#aaa;" for="wave-type">WAVE SHAPE</label>
      <select id="wave-type">
        <option value="sawtooth">Sawtooth</option>
        <option value="square">Square</option>
        <option value="triangle">Triangle</option>
        <option value="sine">Sine</option>
      </select>

      <div class="knob-container">
        <label for="vco-detune">Detune</label>
        <input type="range" id="vco-detune" min="-50" max="50" value="0">
        <span id="detune-val" class="value-display">0 cent</span>
      </div>
    </div>

    <!-- VCA MODULE -->
    <div class="module mod-vca">
      <div class="module-title">VCA EG (Env)</div>
      <div class="knob-container">
        <label for="env-attack">Attack</label>
        <input type="range" id="env-attack" min="0.005" max="0.5" step="0.01" value="0.05">
        <span id="attack-val" class="value-display">0.05s</span>
      </div>
      <div class="knob-container">
        <label for="env-decay">Decay</label>
        <input type="range" id="env-decay" min="0.05" max="1.0" step="0.05" value="0.2">
        <span id="decay-val" class="value-display">0.2s</span>
      </div>
      <div class="knob-container">
        <label for="env-sustain">Sustain</label>
        <input type="range" id="env-sustain" min="0" max="1" step="0.1" value="0.4">
        <span id="sustain-val" class="value-display">0.4</span>
      </div>
    </div>

    <!-- LFO MODULE -->
    <div class="module mod-lfo">
      <div class="module-title">LFO (VCF Mod)</div>
      <div class="knob-container">
        <label for="lfo-rate">Rate</label>
        <input type="range" id="lfo-rate" min="0.1" max="10" step="0.1" value="2">
        <span id="lfo-rate-val" class="value-display">2 Hz</span>
      </div>
      <div class="knob-container">
        <label for="lfo-depth">Depth</label>
        <input type="range" id="lfo-depth" min="0" max="2000" step="50" value="500">
        <span id="lfo-depth-val" class="value-display">500 Hz</span>
      </div>
    </div>

    <!-- QUANTIZER / SCALE MODULE -->
    <div class="module mod-scale">
      <div class="module-title">QUANTIZER / SCALE</div>
      
      <label style="font-size:10px; color:#aaa;" for="scale-preset">MODE PRESETS</label>
      <select id="scale-preset">
        <option value="default">Default (Cmaj7-Am7-Fmaj7-G7)</option>
        <option value="aeolian">A Minor / Aeolian</option>
        <option value="dorian">D Dorian Mode</option>
        <option value="custom">-- CUSTOM STRINGS --</option>
      </select>

      <label style="font-size:10px; color:#aaa; margin-top:5px; align-self:flex-start; margin-left:10px;">CHORD 1:</label>
      <input type="text" id="chord-0" value="C3 E3 G3 B3">

      <label style="font-size:10px; color:#aaa; align-self:flex-start; margin-left:10px;">CHORD 2:</label>
      <input type="text" id="chord-1" value="A2 C3 E3 G3">

      <label style="font-size:10px; color:#aaa; align-self:flex-start; margin-left:10px;">CHORD 3:</label>
      <input type="text" id="chord-2" value="F2 A2 C3 E3">

      <label style="font-size:10px; color:#aaa; align-self:flex-start; margin-left:10px;">CHORD 4:</label>
      <input type="text" id="chord-3" value="G2 B2 D3 F3">
    </div>

    <!-- DRUM CONTROLS MODULE -->
    <div class="module mod-drums">
      <div class="module-title">Drum Synthesis</div>
      <div class="knob-container">
        <label for="kick-decay">Kick Snap</label>
        <input type="range" id="kick-decay" min="0.1" max="0.6" step="0.05" value="0.3">
        <span id="kick-val" class="value-display">0.3s</span>
      </div>
      <div class="knob-container">
        <label for="hat-decay">Hat Decay</label>
        <input type="range" id="hat-decay" min="0.01" max="0.2" step="0.01" value="0.05">
        <span id="hat-val" class="value-display">0.05s</span>
      </div>
    </div>

  </div>

  <!-- 16-Step Grid Sequencer Panel -->
  <div class="sequencer-panel">
    <div class="module-title" style="border:none; margin:0 0 10px 0; text-align:left;">16-STEP MATRIX SEQUENCER</div>
    
    <!-- Kick Row -->
    <div class="sequencer-row" data-track="kick">
      <div class="row-label">■ KICK (VCO)</div>
      <div class="grid-container" id="grid-kick"></div>
    </div>

    <!-- Hi-Hat Row -->
    <div class="sequencer-row" data-track="hat">
      <div class="row-label">■ HAT (PINK)</div>
      <div class="grid-container" id="grid-hat"></div>
    </div>

    <!-- Shift Register Mutation Melody Trigger Row -->
    <div class="sequencer-row" data-track="melody">
      <div class="row-label">■ CHORD TRG</div>
      <div class="grid-container" id="grid-melody"></div>
    </div>

    <!-- Live Status Loop Data Visualizer -->
    <div class="turing-status" id="turing-log">
      SHIFT REGISTER STATE: [Initialized. Waiting for engine start...]
    </div>
  </div>

  <script>
    /* ==========================================
       1. SYNTH ENGINE AUDIO ARCHITECTURE (Tone.js)
       ========================================== */
    const masterCompressor = new Tone.Compressor({
      threshold: -18,
      ratio: 4,
      attack: 0.02,
      release: 0.05
    }).toDestination();

    const masterVolumeNode = new Tone.Volume(-6).connect(masterCompressor);

    // --- TRACK 1: CHORD SYNTH ---
    const vcf = new Tone.Filter(1000, "lowpass").connect(masterVolumeNode);
    
    const chordSynth = new Tone.PolySynth(Tone.Synth, {
      oscillator: { type: "sawtooth", detune: 0 },
      envelope: { attack: 0.05, decay: 0.2, sustain: 0.4, release: 0.5 }
    }).connect(vcf);

    const lfo = new Tone.LFO({ frequency: "2hz", min: 400, max: 1400 }).start();
    lfo.connect(vcf.frequency);

    // --- TRACK 2: KICK DRUM ENGINE ---
    const kickSynth = new Tone.MembraneSynth({
      envelope: { attack: 0.001, decay: 0.3, sustain: 0, release: 0.3 },
      oscillator: { type: "sine" }
    }).connect(masterVolumeNode);

    // --- TRACK 3: HI-HAT ENGINE ---
    const hatEnvelope = new Tone.AmplitudeEnvelope({
      attack: 0.001, decay: 0.05, sustain: 0, release: 0.05
    }).connect(masterVolumeNode);
    
    const hatFilter = new Tone.Filter(8000, "highpass").connect(hatEnvelope);
    const pinkNoiseNode = new Tone.Noise("pink").start().connect(hatFilter);


    /* ==========================================
       2. SEMI-RANDOM SHIFT REGISTER STRUCTURE
       ========================================== */
    class PseudoShiftRegister {
      constructor(length = 8) {
        this.length = length;
        this.register = Array.from({length: this.length}, () => Math.random());
        this.mutationProbability = 0.25;
      }
      step() {
        this.register.pop();
        const driftVal = Math.random() < this.mutationProbability ? Math.random() : this.register[0];
        this.register.unshift(driftVal);
        return driftVal;
      }
      getCurrentStateString() {
        return this.register.map(v => v.toFixed(2)).join(" | ");
      }
    }
    const turingRegister = new PseudoShiftRegister(8);


    /* ==========================================
       3. HARMONIC DYNAMIC CHORD STATE PRESETS
       ========================================== */
    let runningScaleChords = [
      ["C3", "E3", "G3", "B3"],
      ["A2", "C3", "E3", "G3"],
      ["F2", "A2", "C3", "E3"],
      ["G2", "B2", "D3", "F3"]
    ];

    const presets = {
      default: [
        ["C3", "E3", "G3", "B3"],
        ["A2", "C3", "E3", "G3"],
        ["F2", "A2", "C3", "E3"],
        ["G2", "B2", "D3", "F3"]
      ],
      aeolian: [
        ["A2", "C3", "E3", "G3"], // Am7
        ["F2", "A2", "C3", "E3"], // Fmaj7
        ["C3", "E3", "G3", "B3"], // Cmaj7
        ["E2", "G2", "B2", "D3"]  // Em7
      ],
      dorian: [
        ["D3", "F3", "A3", "C4"], // Dm7
        ["G2", "B2", "D3", "F3"], // G7
        ["C3", "E3", "G3", "B3"], // Cmaj7
        ["A2", "C3", "E3", "G3"]  // Am7
      ]
    };

    function updateChordsFromInputs() {
      for (let i = 0; i < 4; i++) {
        const inputVal = document.getElementById(`chord-${i}`).value.trim();
        if (inputVal) {
          runningScaleChords[i] = inputVal.split(/\s+/);
        }
      }
    }

    for (let i = 0; i < 4; i++) {
      document.getElementById(`chord-${i}`).addEventListener('input', () => {
        document.getElementById('scale-preset').value = 'custom';
        updateChordsFromInputs();
      });
    }

    document.getElementById('scale-preset').addEventListener('change', (e) => {
      const selection = e.target.value;
      if (selection !== 'custom') {
        runningScaleChords = JSON.parse(JSON.stringify(presets[selection]));
        for (let i = 0; i < 4; i++) {
          document.getElementById(`chord-${i}`).value = runningScaleChords[i].join(" ");
        }
      }
    });


    /* ==========================================
       4. STEP-SEQUENCER GRID LOGIC & DOM COUPLING
       ========================================== */
    const TOTAL_STEPS = 16;
    const tracks = {
      kick: Array(TOTAL_STEPS).fill(false),
      hat: Array(TOTAL_STEPS).fill(false),
      melody: Array(TOTAL_STEPS).fill(false)
    };

    tracks.kick[0] = tracks.kick[4] = tracks.kick[8] = tracks.kick[12] = true; 
    tracks.hat[2] = tracks.hat[6] = tracks.hat[10] = tracks.hat[14] = true;
    tracks.melody[0] = tracks.melody[4] = tracks.melody[8] = tracks.melody[12] = true;

    function buildSequencerUI() {
      const rowIds = ['kick', 'hat', 'melody'];
      rowIds.forEach(trackId => {
        const container = document.getElementById(`grid-${trackId}`);
        container.innerHTML = "";
        for (let i = 0; i < TOTAL_STEPS; i++) {
          const btn = document.createElement('button');
          btn.className = 'step-btn';
          if (tracks[trackId][i]) btn.classList.add('active');
          
          btn.addEventListener('click', () => {
            tracks[trackId][i] = !tracks[trackId][i];
            btn.classList.toggle('active');
          });
          container.appendChild(btn);
        }
      });
    }
    buildSequencerUI();


    /* ==========================================
       5. HIGH-PRECISION AUDIO TRANSPORT LOOP
       ========================================== */
    let currentStepIndex = 0;

    Tone.Transport.scheduleRepeat((time) => {
      const rowIds = ['kick', 'hat', 'melody'];
      rowIds.forEach(trackId => {
        const container = document.getElementById(`grid-${trackId}`);
        const buttons = container.children;
        for (let i = 0; i < buttons.length; i++) {
          buttons[i].classList.remove('playing');
        }
        if (buttons[currentStepIndex]) {
          buttons[currentStepIndex].classList.add('playing');
        }
      });

      // --- TRG 1: KICK DRUM ---
      if (tracks.kick[currentStepIndex]) {
        kickSynth.triggerAttackRelease("C1", "8n", time);
      }

      // --- TRG 2: HI-HAT ---
      if (tracks.hat[currentStepIndex]) {
        const randomFactor = turingRegister.step();
        const baseDecay = parseFloat(document.getElementById('hat-decay').value);
        hatEnvelope.decay = baseDecay + (randomFactor * 0.03);
        hatEnvelope.triggerAttackRelease("16n", time);
        
        document.getElementById('turing-log').innerText = `SHIFT REGISTER BITSTREAM: [${turingRegister.getCurrentStateString()}] (Drift Modulating Hat Decay)`;
      }

      // --- TRG 3: MELODIC CHORD TRG ---
      if (tracks.melody[currentStepIndex]) {
        const chordIndex = Math.floor(currentStepIndex / 4) % 4;
        const targetChord = runningScaleChords[chordIndex];
        
        if (targetChord && targetChord.length > 0) {
          chordSynth.triggerAttackRelease(targetChord, "2n", time);
        }
      }

      currentStepIndex = (currentStepIndex + 1) % TOTAL_STEPS;
    }, "16n");


    /* ==========================================
       6. INTERFACE PARAMETER KNOBS & SLIDERS COUPLING
       ========================================== */
    const powerBtn = document.getElementById('power-btn');
    powerBtn.addEventListener('click', async () => {
      if (Tone.Transport.state === 'started') {
        Tone.Transport.stop();
        powerBtn.textContent = "Power On";
        powerBtn.classList.remove('active');
      } else {
        await Tone.start();
        Tone.Transport.start();
        powerBtn.textContent = "Running";
        powerBtn.classList.add('active');
      }
    });

    document.getElementById('bpm-slider').addEventListener('input', (e) => {
      const bpm = e.target.value;
      Tone.Transport.bpm.value = bpm;
      document.getElementById('bpm-val').textContent = bpm;
    });

    document.getElementById('master-volume').addEventListener('input', (e) => {
      const gain = e.target.value;
      masterVolumeNode.volume.value = gain;
      document.getElementById('vol-val').textContent = `${gain}dB`;
    });

    document.getElementById('wave-type').addEventListener('change', (e) => {
      chordSynth.set({ oscillator: { type: e.target.value } });
    });

    document.getElementById('vco-detune').addEventListener('input', (e) => {
      const detune = e.target.value;
      chordSynth.set({ oscillator: { detune: detune } });
      document.getElementById('detune-val').textContent = `${detune} cent`;
    });

    document.getElementById('env-attack').addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      chordSynth.set({ envelope: { attack: val } });
      document.getElementById('attack-val').textContent = `${val}s`;
    });

    document.getElementById('env-decay').addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      chordSynth.set({ envelope: { decay: val } });
      document.getElementById('decay-val').textContent = `${val}s`;
    });

    document.getElementById('env-sustain').addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      chordSynth.set({ envelope: { sustain: val } });
      document.getElementById('sustain-val').textContent = val;
    });

    document.getElementById('lfo-rate').addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      lfo.frequency.value = val;
      document.getElementById('lfo-rate-val').textContent = `${val} Hz`;
    });

    document.getElementById('lfo-depth').addEventListener('input', (e) => {
      const val = parseInt(e.target.value);
      lfo.min = Math.max(100, 900 - val);
      lfo.max = 900 + val;
      document.getElementById('lfo-depth-val').textContent = `${val} Hz`;
    });

    document.getElementById('kick-decay').addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      kickSynth.envelope.decay = val;
      kickSynth.envelope.release = val;
      document.getElementById('kick-val').textContent = `${val}s`;
    });

    document.getElementById('hat-decay').addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      document.getElementById('hat-val').textContent = `${val}s`;
    });
  </script>
</body>
</html>
